name: 全平台编译

on:
  push:
    branches: [ main, master, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:        # 手动触发

jobs:
  ###########################################################################
  # 1️⃣ 代码分析（最快的 runner 上做）
  ###########################################################################
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter analyze

  ###########################################################################
  # 2️⃣ Android APK
  ###########################################################################
  android:
    needs: [analyze]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get

      - name: 🏗️ 构建 Debug APK
        run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

      - name: 🏗️ 构建 Release APK（未签名）
        if: github.ref == 'refs/heads/main'
        run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: android-release-apk-unsigned
          path: build/app/outputs/flutter-apk/app-release-unsigned.apk
          if-no-files-found: warn

  ###########################################################################
  # 3️⃣ Linux 桌面
  ###########################################################################
  linux:
    needs: [analyze]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - run: flutter pub get
      - name: 🏗️ 构建 Linux 桌面版
        run: flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: build/linux/x64/release/bundle/
          if-no-files-found: warn

  ###########################################################################
  # 4️⃣ Windows 桌面
  ###########################################################################
  windows:
    needs: [analyze]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - name: 🏗️ 构建 Windows 桌面版（Release）
        run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build\windows\x64\runner\Release\
          if-no-files-found: warn

  ###########################################################################
  # 5️⃣ iOS（不签名，只能装模拟器）
  ###########################################################################
  ios:
    needs: [analyze]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - name: 🏗️ 构建 iOS 版（不签名，仅模拟器可用）
        run: flutter build ios --debug --no-codesign
      - uses: actions/upload-artifact@v4
        with:
          name: ios-debug
          path: build/ios/iphonesimulator/
          if-no-files-found: warn

  ###########################################################################
  # 6️⃣ macOS 桌面
  ###########################################################################
  macos:
    needs: [analyze]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - name: 🏗️ 构建 macOS 桌面版
        run: flutter build macos --release
      - uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: build/macos/Build/Products/Release/
          if-no-files-found: warn
